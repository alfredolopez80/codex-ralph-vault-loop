minimum_pre_commit_version: "3.5.0"
fail_fast: false

default_stages:
  - pre-commit

exclude: |
  (?x)^(
    \.git/|
    \.venv-model-router/|
    \.claude/logs/|
    \.claude/quality-results/|
    docs/diagrams/.*\.(png|svg)$
  )

repos:
  - repo: local
    hooks:
      - id: yaml-parse
        name: yaml parse
        entry: python3 -c 'import sys, yaml; [yaml.safe_load(open(path, encoding="utf-8")) for path in sys.argv[1:]]'
        language: system
        files: '\.(ya?ml)$'

      - id: python-compile
        name: python compile
        entry: python3 -m py_compile
        language: system
        types: [python]

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: "^\\.claude/"

      - id: shfmt-check
        name: shfmt check
        entry: shfmt -d -i 2 -ci -sr
        language: system
        types: [shell]
        exclude: "^\\.claude/"

      - id: prettier-check
        name: prettier check
        entry: prettier --check --ignore-unknown
        language: system
        files: '\.(md|ya?ml|json)$'
        exclude: '^(\.claude/.*|\.agents/skills/(cost-router|model-router)/.*|docs/diagrams/.*|AGENTS\.md|CLAUDE\.md|README\.md|docs/codex-global-skills\.md)$'

      - id: gitleaks-staged
        name: gitleaks staged secret scan
        entry: gitleaks protect --staged --redact --no-banner
        language: system
        pass_filenames: false

      - id: semgrep-local-secrets
        name: semgrep local secret patterns
        entry: env SEMGREP_ENABLE_VERSION_CHECK=0 SEMGREP_SEND_METRICS=off semgrep scan --quiet --error --config .semgrep.yml
        language: system
        pass_filenames: true
        types_or: [text, python, shell, yaml, json, markdown, toml]
        exclude: "^\\.claude/"
