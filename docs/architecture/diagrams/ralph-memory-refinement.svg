  <text x="190.0" y="466.0" text-anchor="middle" class="node-sub">not read by default</text>
  <rect x="370.0" y="545.0" width="260.0" height="78.0" rx="10.0" fill="#eef2ff" stroke="#6366f1" stroke-width="1.8" filter="url(#shadowSoft)"/>
