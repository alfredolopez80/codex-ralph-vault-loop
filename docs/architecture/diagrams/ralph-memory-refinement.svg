    .node-title { font-size: 18px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; font-weight: 500; fill: #6b7280; }
    .node-type { font-size: 12px; font-weight: 700; fill: #9ca3af; letter-spacing: 0.08em; }
