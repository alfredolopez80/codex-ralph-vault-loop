  <text x="815.0" y="771.0" text-anchor="middle" class="node-sub">approve, reject, or retarget</text>
  <rect x="370.0" y="870.0" width="260.0" height="78.0" rx="10.0" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8" filter="url(#shadowSoft)"/>
