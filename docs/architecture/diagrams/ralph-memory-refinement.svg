  <text x="482.0" y="833.0" text-anchor="middle" class="arrow-label">yes</text>
  <rect x="622.5" y="798.0" width="70" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="657.5" y="812.0" text-anchor="middle" class="arrow-label">approved</text>
  <rect x="433.0" y="965.0" width="98" height="20" rx="6" fill="#ffffff" opacity="0.94"/>
  <text x="482.0" y="979.0" text-anchor="middle" class="arrow-label">default read</text>
  <text x="42.0" y="1184.0" class="footnote">Aristotelian rule: reject weak assumptions, keep RED out, graduate only clear evidence, ask the user when uncertain.</text>
