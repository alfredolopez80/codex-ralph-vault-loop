  <line x1="268" y1="350" x2="336" y2="350" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="532" y1="350" x2="600" y2="350" stroke="#10a37f" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <line x1="796" y1="350" x2="864" y2="350" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 180 382 C 160 450 158 500 180 540" stroke="#f97316" stroke-width="1.6" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M 434 382 C 430 454 430 500 434 540" stroke="#1d4ed8" stroke-width="1.6" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 698 382 C 690 454 690 500 698 540" stroke="#1d4ed8" stroke-width="1.6" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 962 382 C 970 454 970 500 962 540" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="532" y1="572" x2="600" y2="572" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="796" y1="572" x2="864" y2="572" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="96" y="708" width="1008" height="40" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="116" y="733" text-anchor="start" class="small">Recall reads curated or scoped runtime memory only after identity and safety gates pass.</text>
