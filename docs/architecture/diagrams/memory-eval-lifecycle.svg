  <text x="434" y="569" text-anchor="middle" class="node-title">Runtime memory</text>
  <text x="434" y="589" text-anchor="middle" class="node-text">project-scoped</text>
  <rect x="600" y="540" width="196" height="64" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="698" y="569" text-anchor="middle" class="node-title">Vault inbox</text>
