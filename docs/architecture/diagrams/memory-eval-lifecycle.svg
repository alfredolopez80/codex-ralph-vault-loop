  <line x1="532" y1="164" x2="600" y2="164" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="796" y1="164" x2="864" y2="164" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
