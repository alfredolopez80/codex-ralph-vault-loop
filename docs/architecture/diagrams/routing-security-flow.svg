<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .title { fill: #0d0d0d; font-size: 25px; font-weight: 650; }
    .subtitle { fill: #6e6e80; font-size: 13px; }
    .group-label { fill: #6e6e80; font-size: 12px; font-weight: 650; letter-spacing: .04em; }
    .node-title { fill: #0d0d0d; font-size: 15px; font-weight: 650; }
    .node-text { fill: #6e6e80; font-size: 12px; }
    .small { fill: #6e6e80; font-size: 11px; }
    .warn { fill: #9a3412; font-size: 12px; font-weight: 650; }
  </style>


  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#71717a"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10a37f"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#ffffff"/>
  <text x="600" y="36" text-anchor="middle" class="title">Sensitivity, Cost Routing, and Safety Flow</text>
  <text x="600" y="58" text-anchor="middle" class="subtitle">RED stays local; eligible work routes through Codex, subagents, or MCP advisors</text>
  <rect x="72" y="110" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="160" y="139" text-anchor="middle" class="node-title">Intake</text>
  <text x="160" y="159" text-anchor="middle" class="node-text">task, scope, repo</text>
  <polygon points="420,92 536,143 420,194 304,143" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="420" y="138" text-anchor="middle" class="node-title">Sensitivity?</text>
  <text x="420" y="157" text-anchor="middle" class="node-text">GREEN / YELLOW / RED</text>
  <polygon points="704,92 824,143 704,194 584,143" fill="#ffffff" stroke="#f97316" stroke-width="1.5"/>
  <text x="704" y="138" text-anchor="middle" class="node-title">RED found?</text>
  <text x="704" y="157" text-anchor="middle" class="node-text">local-only material</text>
  <rect x="936" y="102" width="184" height="82" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="936" y="102" width="4" height="82" rx="2" fill="#f97316"/>
  <text x="1028" y="131" text-anchor="middle" class="node-title">Block external</text>
  <text x="1028" y="151" text-anchor="middle" class="node-text">Codex local only</text>
  <text x="1028" y="168" text-anchor="middle" class="node-text">no vault write</text>
  <rect x="296" y="262" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="384" y="291" text-anchor="middle" class="node-title">Complexity</text>
  <text x="384" y="311" text-anchor="middle" class="node-text">score 1-10</text>
  <rect x="552" y="262" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="552" y="262" width="4" height="66" rx="2" fill="#10a37f"/>
  <text x="640" y="291" text-anchor="middle" class="node-title">Cost router</text>
  <text x="640" y="311" text-anchor="middle" class="node-text">deterministic JSON</text>
  <rect x="100" y="424" width="184" height="82" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="192" y="453" text-anchor="middle" class="node-title">Codex direct</text>
  <text x="192" y="473" text-anchor="middle" class="node-text">simple or local-only</text>
  <text x="192" y="490" text-anchor="middle" class="node-text">main owns edits</text>
  <rect x="372" y="424" width="184" height="82" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="464" y="453" text-anchor="middle" class="node-title">Codex subagent</text>
  <text x="464" y="473" text-anchor="middle" class="node-text">narrow TOML role</text>
  <text x="464" y="490" text-anchor="middle" class="node-text">bounded scope</text>
  <rect x="644" y="424" width="184" height="82" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="736" y="453" text-anchor="middle" class="node-title">MCP advisor</text>
  <text x="736" y="473" text-anchor="middle" class="node-text">sanitized context</text>
  <text x="736" y="490" text-anchor="middle" class="node-text">advice only</text>
  <rect x="916" y="424" width="192" height="82" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="1012" y="453" text-anchor="middle" class="node-title">Reader / vision</text>
  <text x="1012" y="473" text-anchor="middle" class="node-text">search, repo, URL</text>
  <text x="1012" y="490" text-anchor="middle" class="node-text">analysis only</text>
  <rect x="280" y="610" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="280" y="610" width="4" height="66" rx="2" fill="#10a37f"/>
  <text x="368" y="639" text-anchor="middle" class="node-title">Codex synthesis</text>
  <text x="368" y="659" text-anchor="middle" class="node-text">local verification</text>
  <rect x="512" y="610" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="600" y="639" text-anchor="middle" class="node-title">Gates / evals</text>
  <text x="600" y="659" text-anchor="middle" class="node-text">reports required</text>
  <rect x="744" y="610" width="176" height="66" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="744" y="610" width="4" height="66" rx="2" fill="#1d4ed8"/>
  <text x="832" y="639" text-anchor="middle" class="node-title">Vault + handoff</text>
  <text x="832" y="659" text-anchor="middle" class="node-text">safe result only</text>
  <line x1="248" y1="143" x2="304" y2="143" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="536" y1="143" x2="584" y2="143" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="824" y1="143" x2="936" y2="143" stroke="#f97316" stroke-width="1.6" marker-end="url(#arrow-orange)"/>
  <text x="874" y="132" text-anchor="middle" class="warn">yes</text>
  <path d="M 704 194 L 704 226 L 384 226 L 384 262" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <text x="558" y="218" text-anchor="middle" class="small">no: eligible after sanitization</text>
  <line x1="472" y1="295" x2="552" y2="295" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 640 328 C 552 366 288 370 192 424" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M 640 328 C 596 370 516 376 464 424" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <line x1="640" y1="328" x2="736" y2="424" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 640 328 C 760 354 940 376 1012 424" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M 192 506 C 238 568 300 588 368 610" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 464 506 C 448 562 416 588 368 610" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 736 506 C 676 562 496 588 368 610" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 1012 506 C 870 570 520 596 368 610" stroke="#10a37f" stroke-width="1.6" fill="none" marker-end="url(#arrow-green)"/>
  <line x1="456" y1="643" x2="512" y2="643" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="688" y1="643" x2="744" y2="643" stroke="#71717a" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="96" y="714" width="1008" height="36" rx="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="116" y="737" text-anchor="start" class="small">Rule: RED stays local. External output is advisory until Codex verifies it.</text>
</svg>
