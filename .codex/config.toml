# Local Codex project defaults for this overlay.
# Non-OpenAI systems such as Z.ai and MiniMax are external MCP dependencies,
# not direct Codex model providers.

model = "gpt-5.5"
model_reasoning_effort = "high"

[features]
multi_agent = true
codex_hooks = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 900

# Official Z.ai remote MCPs. Both canonical and legacy names are declared so
# Codex App/CLI, subagents, and migration docs can refer to either convention.
[mcp_servers.zai_web_search]
url = "https://api.z.ai/api/mcp/web_search_prime/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0
enabled_tools = ["web_search_prime"]

[mcp_servers.web-search-prime]
url = "https://api.z.ai/api/mcp/web_search_prime/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0
enabled_tools = ["web_search_prime"]

[mcp_servers.zai_web_reader]
url = "https://api.z.ai/api/mcp/web_reader/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0
enabled_tools = ["webReader"]

[mcp_servers.web-reader]
url = "https://api.z.ai/api/mcp/web_reader/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0
enabled_tools = ["webReader"]

[mcp_servers.zai_zread]
url = "https://api.z.ai/api/mcp/zread/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 180.0
enabled_tools = ["search_doc", "get_repo_structure", "read_file"]

[mcp_servers.zread]
url = "https://api.z.ai/api/mcp/zread/mcp"
bearer_token_env_var = "Z_AI_API_KEY"
startup_timeout_sec = 20.0
tool_timeout_sec = 180.0
enabled_tools = ["search_doc", "get_repo_structure", "read_file"]

[mcp_servers.zai_vision]
command = "npx"
args = ["-y", "@z_ai/mcp-server@latest"]
env_vars = ["Z_AI_API_KEY", "Z_AI_MODE"]
startup_timeout_sec = 30.0
tool_timeout_sec = 300.0
enabled_tools = [
  "ui_to_artifact",
  "extract_text_from_screenshot",
  "diagnose_error_screenshot",
  "understand_technical_diagram",
  "analyze_data_visualization",
  "ui_diff_check",
  "analyze_image",
  "analyze_video",
]

[mcp_servers.minimax_coding_tools]
command = "/Users/alfredolopez/.local/bin/uvx"
args = ["minimax-coding-plan-mcp", "-y"]
env_vars = ["MINIMAX_API_KEY", "MINIMAX_API_HOST"]
startup_timeout_sec = 30.0
tool_timeout_sec = 180.0
enabled_tools = ["web_search", "understand_image"]

